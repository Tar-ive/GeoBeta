layer:
  id: development
  name: Development
  description: Development layer for GeoAlpha geopolitical risk analysis
  compute_type: standard
  memory: 4gb

requirements:
  - pandas
  - numpy
  - requests
  - beautifulsoup4
  - lxml
  - sqlalchemy
  - psycopg2-binary
  - anthropic
  - fredapi
  - python-dateutil

secrets:
  - NEON_DATABASE_URL
  - ALPHA_VANTAGE_API_KEY
  - FRED_API_KEY
  - KALSHI_API_KEY
  - ANTHROPIC_API_KEY
